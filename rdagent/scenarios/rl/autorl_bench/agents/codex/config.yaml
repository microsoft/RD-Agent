name: "Codex CLI Agent"
description: "One-shot agent: receives a full prompt and uses Codex CLI to complete coding, training, and evaluation submission autonomously"
start: "start.sh"
env_vars:
CODEX_MODEL: "gpt-5.2" #Default LLM (can be overridden by environment variables)
CODEX_PROVIDER: "litellm" # The default is litellm proxy (can be overridden by environment variables)
CODEX_TIMEOUT: "36000" # Codex CLI total timeout (seconds) = 10 hours
