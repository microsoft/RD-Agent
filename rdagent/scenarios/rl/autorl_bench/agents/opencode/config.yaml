name: "OpenCode Agent"
description: "Fixed-stage pipeline: code generation -> training -> evaluation -> feedback (based on opencode-rl)"
start: "start.sh"
env_vars:
  MAX_ITERATIONS: "5"
  TRAINING_TIMEOUT: "7200"
  MAX_AGENT_STEPS: "25"
  MAX_RETRIES: "20"
  STALE_TIMEOUT: "1800"
  HTTP_TIMEOUT: "600"
  EVAL_TIMEOUT: "7200"
  MAX_STEPS: "20"
