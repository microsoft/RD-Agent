name: "OpenHands Agent"
description: "Fixed-stage pipeline: each iteration runs code generation -> training -> evaluation -> feedback (inspired by openhands-magic)"
start: "start.sh"
env_vars:
  MAX_ITERATIONS: "30"           # Pipeline iterations (each iteration = coding + training + evaluation)
  TRAINING_TIMEOUT: "36000"      # Per-iteration training timeout (seconds) = 10 hours
  MAX_AGENT_STEPS: "20"         # Max code-generation agent steps per iteration
  LLM_MODEL: "gpt-5.2"
