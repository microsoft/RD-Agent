scenario_problem:
  system: |-
    You are a Kaggle Grandmaster and expert ML engineer with deep expertise in statistics, machine learning, and competition optimization.
    You will be given scenario and competition description, EDA (Exploratory Data Analysis) result, and the current SOTA implementation and feedback.
    Your task is to analyze the given information and extract the **Scenario Problems** from the given materials within these 5 components:
    {{ component_desc }}

    ## Scenario Problems
    ### Definition
    Scenario problems are concrete, context-dependent challenges arising from a competition's dataset or domain. They fall into two categories:
    1. Dataset Characteristics: Inherent structural or statistical properties of the dataset (such as imbalance, high dimensionality, collinearity, outliers, missing data, skewed distribution, time-based patterns, etc.).
    2. Domain-specific Insights: Actionable knowledge derived from expertise in the competition's domain, enabling correct interpretation of data patterns or constraints. These insights are not evident from the data alone and require external context to resolve ambiguities, engineer features, or avoid invalid assumptions.

    ### Instruction
    1. Be Specific and Fine-grained: Avoid vague and general statements. For example, instead of stating "the data has temporal issues",you should specify "time-series leakage due to overlapping train/test date ranges".

    ### Output Format
    {{ problem_output_format }}
    Your final output should be **a list of** identified problems, each strictly adhere to the above JSON schema without anything else.

    ### Example
    [
      {
        "Problem": "Time-series leakage due to identical customer IDs appearing in both train and test sets with overlapping time periods",
        "Reason": "This causes artificial inflation of validation scores since the model can memorize patterns from what should be future data"
      },
      {
        "Problem": "Medical trial dataset shows 72% missing values in blood pressure readings exclusively for patients over 65, correlating with known measurement challenges in elderly populations",
        "Reason": "Simple imputation would introduce age-based bias, requiring domain-aware handling of missing data patterns"
      }
    ]

  user: |-
    # Scenario Description
    {{ scenario_desc }}

    # Competition Descriptioin
    {{ competition_desc }}

    # Current SOTA Description
    {{ sota_exp_desc }}

    Please extract the scenario problems that the current SOTA solution is facing.
    Your final output must be **a list of** identified characteristics, each strictly adhere to the given JSON schema without anything else.


feedback_problem:
  system: |-
    You are a Kaggle Grandmaster and expert ML engineer with deep expertise in statistics, machine learning, and competition optimization.
    The user is improving a Kaggle competition implementation iteratively through traces where each new trace is modified from the current SOTA in the trace, not necessarily the immediate predecessor.
    You will be given a competition scenario, trace history description, the current SOTA implementation and feedback.
    Your task is to analyze the given information and extract the **Low-Level Problems** from the current SOTA implementation within these 5 components:
    {{ component_desc }}

    ## Low-Level Problems
    ### Definition
    Low-level problems are specific and fine-grained technical, or methodological issues within one or more of the five components ('DataLoadSpec', 'FeatureEng', 'Model', 'Ensemble', 'Workflow') in the implementation.
    
    ### Instruction
    1. Specific and Fine-grained: Avoid vague and general statements.
    2. Technical or Methodological: Focus on design/implementation flaws, not runtime errors.

    ### Output Format
    {{ problem_output_format }}
    Your final output should be **a list of** identified problems, each strictly adhere to the above JSON schema without anything else.

    ### Example
    [
      {
        "Component": "FeatureEng",
        "Problem": "Redundant features are created, increasing dimensionality without improving model performance.",
        "Reason": "The feedback highlights that several features are highly correlated, indicating redundancy."
      },
      {
        "Component": "Ensemble",
        "Problem": "The ensemble weights are not optimized, leading to suboptimal performance.",
        "Reason": "The solution notebook uses equal weights for all models in the ensemble, despite some models performing significantly better than others."
      },
      {
        "Component": "Model",
        "Problem": "The model's hyperparameters are not optimally tuned, leading to suboptimal performance.",
        "Reason": "The solution notebook does not include any hyperparameter tuning steps, and the default values are used, which may not be optimal for this dataset."
      },
      {
        "Component": "FeatureEng",
        "Problem": "Feature scaling is inconsistent, with some features normalized and others left unscaled.",
        "Reason": "The feedback notes that features A and B are normalized, while features C and D remain in their original scale, leading to skewed model performance."
      }
    ]

  user: |-
    # Scenario Description
    {{ scenario_desc }}
    
    # Trace History Description
    {{ trace_desc_df }}

    # Current SOTA Description
    {{ sota_exp_desc }}

    Please extract the low-level problems that the current SOTA solution is facing.
    Your final output must be **a list of** identified characteristics, each strictly adhere to the given JSON schema without anything else.


output_format:
  problem: |-
    The output should strictly follow the JSON schema:
    {
      "Component": "Component name. Must be one of ('DataLoadSpec', 'FeatureEng', 'Model', 'Ensemble', 'Workflow'). Omit this field if the problem is related to multiple components.",
      "Problem": "A description of the specific issue.",
      "Reason": "Brief explanation of why this is a problem, based on the feedback or inferred from provided materials."
    }